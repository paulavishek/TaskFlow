<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSS Toggle Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Lean Six Sigma Toggle Styles */
        .hide-lean-features .lean-sigma-element {
            display: none !important;
        }

        /* Specific targeting for LSS elements by ID */
        .hide-lean-features #suggest-lss-classification,
        .hide-lean-features #classify-spinner,
        .hide-lean-features #lss-suggestion-container {
            display: none !important;
            visibility: hidden !important;
        }

        .hide-lean-features .task-label[data-category="lean"] {
            display: none !important;
        }

        .hide-lean-features select[name="labels"] option[data-category="lean"],
        .hide-lean-features #id_labels option[data-category="lean"] {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1>LSS Toggle Test Page</h1>
        
        <div class="mb-3">
            <button type="button" class="btn btn-secondary" onclick="toggleLeanSixSigmaFeatures()">
                <i class="fas fa-industry me-2 text-secondary"></i>Hide Lean Six Sigma Tools
            </button>
        </div>
        
        <div class="alert alert-info">
            <strong>Current State:</strong> <span id="status">LSS features visible</span>
        </div>
        
        <!-- Test Elements -->
        <div class="card">
            <div class="card-body">
                <h5>Test Elements:</h5>
                
                <!-- Button with lean-sigma-element class -->
                <button type="button" id="suggest-lss-classification" class="btn btn-sm btn-outline-primary lean-sigma-element">
                    <i class="fas fa-robot me-1"></i> Suggest LSS Classification
                </button>
                
                <!-- Spinner with both class and ID -->
                <div id="classify-spinner" class="d-none text-center mt-2 lean-sigma-element">
                    <div class="spinner-border spinner-border-sm text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <span class="ms-2 text-muted">Analyzing with AI...</span>
                </div>
                
                <!-- Container with both class and ID -->
                <div id="lss-suggestion-container" class="alert alert-info mb-3 d-none lean-sigma-element">
                    <div class="d-flex align-items-start">
                        <i class="fas fa-robot mt-1 me-2"></i>
                        <div>
                            <strong>AI Suggestion:</strong>
                            <p id="lss-suggestion-text" class="mb-0">Test suggestion text</p>
                        </div>
                    </div>
                </div>
                
                <!-- Info button with lean class -->
                <button type="button" class="btn btn-sm p-0 lean-sigma-element" data-bs-toggle="modal" data-bs-target="#leanLabelsInfoModal">
                    <i class="fas fa-info-circle text-primary" title="Learn about Lean Six Sigma labels"></i>
                </button>
                
                <!-- Test select with lean options -->
                <div class="mt-3">
                    <label for="test-labels">Test Labels:</label>
                    <select id="test-labels" name="labels" class="form-control" multiple>
                        <option value="1">Regular Label 1</option>
                        <option value="2" data-category="lean">Value-Added (VA)</option>
                        <option value="3">Regular Label 2</option>
                        <option value="4" data-category="lean">Necessary Non-Value Added (NNVA)</option>
                        <option value="5">Regular Label 3</option>
                        <option value="6" data-category="lean">Waste/Eliminate</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Lean Six Sigma Tools Toggle Function
        function toggleLeanSixSigmaFeatures() {
            console.log('=== TOGGLE FUNCTION CALLED ===');
            
            const isHidden = document.body.classList.contains('hide-lean-features');
            console.log('Current state - isHidden:', isHidden);
            
            if (isHidden) {
                console.log('SHOWING LSS features...');
                document.body.classList.remove('hide-lean-features');
                document.getElementById('status').textContent = 'LSS features visible';
            } else {
                console.log('HIDING LSS features...');
                document.body.classList.add('hide-lean-features');
                document.getElementById('status').textContent = 'LSS features hidden';
            }
            
            // Update button text
            updateToggleButtonText();
        }

        function updateToggleButtonText() {
            const isHidden = document.body.classList.contains('hide-lean-features');
            const toggleBtn = document.querySelector('[onclick="toggleLeanSixSigmaFeatures()"]');
            
            if (toggleBtn) {
                if (isHidden) {
                    toggleBtn.innerHTML = '<i class="fas fa-eye me-2 text-secondary"></i>Show Lean Six Sigma Tools';
                } else {
                    toggleBtn.innerHTML = '<i class="fas fa-industry me-2 text-secondary"></i>Hide Lean Six Sigma Tools';
                }
            }
        }

        // Test on page load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Test page loaded');
            
            // List all lean elements found
            const leanElements = document.querySelectorAll('.lean-sigma-element');
            console.log('Found lean-sigma-element elements:', leanElements.length);
            leanElements.forEach((element, i) => {
                console.log(`Element ${i}:`, element);
            });
            
            // Check specific button
            const suggestButton = document.getElementById('suggest-lss-classification');
            console.log('Suggest LSS Classification button:', suggestButton);
        });
    </script>
</body>
</html>
